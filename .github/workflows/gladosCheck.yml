name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'README.md'
      - 'imgs/**'
      - 'docs/**'
  schedule:
    # Test: Beijing 18:30 = UTC 10:30
    - cron: '30 10 * * *'

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    strategy:
      matrix:
        python-version: [3.13]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    - name: Running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        NOTIFY_WEBHOOK_TYPE: ${{ secrets.NOTIFY_WEBHOOK_TYPE }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

    - name: Keep alive
      uses: liskin/gh-workflow-keepalive@v1

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success